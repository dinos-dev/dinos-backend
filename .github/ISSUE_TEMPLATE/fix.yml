name: Fix
description: 버그 수정 / 기능 보완
title: "[fix/] "
labels: ["fix", "backend"]
assignees: ["esyeol"]
body:
  - type: input
    id: branch
    attributes:
      label: 브랜치명 (fix/ 뒤에 올 이름)
      placeholder: "예: pin-toggle-action-response"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: 이슈
      description: 어떤 문제가 있었는지
      placeholder: |
        - pin toggle시 생성/제거 여부를 클라이언트가 알 수 없음
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 원인
      placeholder: |
        - response에 action 필드가 없어 toggle 결과를 판별 불가

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 유의사항
      description: 추후 확장 시 고려할 점 (선택)
